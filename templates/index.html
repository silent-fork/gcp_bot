<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawa Voice Navigator</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(120deg, #232526, #414345);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(30, 30, 30, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 32px 24px 24px 24px;
        }
        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .status {
            text-align: center;
            margin-bottom: 16px;
            font-size: 1.1em;
            color: #ffd700;
        }
        .chat {
            background: #222;
            border-radius: 10px;
            padding: 16px;
            height: 320px;
            overflow-y: auto;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .msg {
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .msg.user {
            text-align: right;
            color: #7ecfff;
        }
        .msg.bot {
            text-align: left;
            color: #ffd700;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .video-mode {
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 1em;
            margin-right: 8px;
        }
        .mic-btn {
            background: #ffd700;
            color: #232526;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .mic-btn.active {
            background: #ff5252;
            color: #fff;
        }
        .stop-btn {
            background: #444;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 1em;
            margin-left: 8px;
            cursor: pointer;
        }
        .stop-btn:disabled {
            background: #222;
            color: #888;
            cursor: not-allowed;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #aaa;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jawa Voice Navigator</h1>
        <div class="status" id="status">Ready.</div>
        <div class="chat" id="chat"></div>
        <div class="controls">
            <select id="videoMode" class="video-mode">
                <option value="none">No Video</option>
                <option value="camera">Share Camera</option>
                <option value="screen">Share Screen</option>
            </select>
            <button id="micBtn" class="mic-btn" title="Start/Stop Voice"><span id="micIcon">🎤</span></button>
            <button id="stopBtn" class="stop-btn" disabled>Stop</button>
        </div>
    </div>
    <div class="footer">
        Powered by Google Gemini, Flask, and Socket.IO &mdash; <a href="https://github.com/google-gemini/cookbook" style="color:#ffd700;" target="_blank">Learn more</a>
    </div>
    <audio id="audioPlayer" style="display:none;"></audio>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        const statusDiv = document.getElementById('status');
        const chatDiv = document.getElementById('chat');
        const micBtn = document.getElementById('micBtn');
        const stopBtn = document.getElementById('stopBtn');
        const videoModeSel = document.getElementById('videoMode');
        const micIcon = document.getElementById('micIcon');
        const audioPlayer = document.getElementById('audioPlayer');

        let isActive = false;
        let currentVideoMode = 'none';

        function addMsg(text, sender) {
            const msg = document.createElement('div');
            msg.className = 'msg ' + sender;
            msg.textContent = text;
            chatDiv.appendChild(msg);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function setStatus(msg) {
            statusDiv.textContent = msg;
        }

        function setActive(active) {
            isActive = active;
            micBtn.classList.toggle('active', active);
            stopBtn.disabled = !active;
            videoModeSel.disabled = active;
            micBtn.disabled = active;
            if (active) {
                micIcon.textContent = '🔴';
            } else {
                micIcon.textContent = '🎤';
            }
        }

        micBtn.onclick = () => {
            if (isActive) return;
            currentVideoMode = videoModeSel.value;
            socket.emit('start_interaction', { video_mode: currentVideoMode });
            setActive(true);
            setStatus('Connecting...');
        };

        stopBtn.onclick = () => {
            if (!isActive) return;
            socket.emit('stop_interaction');
            setActive(false);
            setStatus('Stopped.');
        };

        videoModeSel.onchange = () => {
            // No-op, mode sent on start
        };

        socket.on('status', data => {
            setStatus(data.message);
        });
        socket.on('error', data => {
            setStatus('Error: ' + data.message);
            setActive(false);
        });
        socket.on('user_text', data => {
            addMsg(data.text, 'user');
        });
        socket.on('bot_text', data => {
            addMsg(data.text, 'bot');
        });
        socket.on('bot_speech_start', () => {
            setStatus('Bot is speaking...');
        });
        socket.on('bot_speech_end', () => {
            setStatus('Listening...');
        });
        socket.on('interaction_stopped', data => {
            setStatus(data.message || 'Interaction stopped.');
            setActive(false);
        });
        socket.on('connect', () => {
            setStatus('Connected. Ready.');
        });
        socket.on('disconnect', () => {
            setStatus('Disconnected from server.');
            setActive(false);
        });
    </script>
</body>
</html>
